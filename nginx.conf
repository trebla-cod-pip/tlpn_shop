# Nginx конфигурация для Tulpin Shop
# Домен: tlpn.shop

upstream django_app {
    server 0.0.0.0:8000;
}

server {
    listen 80;
    server_name tlpn.shop www.tlpn.shop;

    # Certbot challenge файлы
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Перенаправление остального трафика на HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tlpn.shop www.tlpn.shop;

    # SSL сертификаты (будут обновлены Certbot)
    ssl_certificate /etc/letsencrypt/live/tlpn.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlpn.shop/privkey.pem;

    # SSL настройки
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Современные настройки безопасности
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (опционально)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Логирование
    access_log /var/log/nginx/tlpn_shop_access.log;
    error_log /var/log/nginx/tlpn_shop_error.log;

    # Максимальный размер загружаемых файлов
    client_max_body_size 100M;

    # Статические файлы (собираются через collectstatic)
    location /static/ {
        alias /root/tlpn_shop/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Медиа файлы (загруженные пользователями)
    location /media/ {
        alias /root/tlpn_shop/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Проксирование к Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Буферы
        proxy_buffering off;
    }

    # Health check endpoint
    location /health/ {
        proxy_pass http://django_app;
        access_log off;
    }
}
