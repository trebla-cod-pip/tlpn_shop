<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Tulipa - ������� ���������{% endblock %}</title>

    <!-- Local fonts generated by setup_fonts.sh / setup.sh -->
    <link rel="preload" href="{% static 'fonts/Inter-400.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">

    <!-- Preconnect for hero image host -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin>
    
    <style>
        :root {
            --background: #ffffff;
            --foreground: #0b0b0b;
            --border: #00000014;
            --input: #f6f6f6;
            --primary: #000000;
            --primary-foreground: #ffffff;
            --secondary: #f3f4f6;
            --secondary-foreground: #0b0b0b;
            --muted: #f8f8f9;
            --muted-foreground: #8b8b8b;
            --success: #e6f9f0;
            --success-foreground: #0b6d3a;
            --accent: #fdecef;
            --accent-foreground: #9b2b2b;
            --destructive: #fff1f0;
            --destructive-foreground: #a50e0e;
            --warning: #fff7e6;
            --warning-foreground: #7a5a00;
            --card: #ffffff;
            --card-foreground: #0b0b0b;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --font-family-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-family-body);
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 72px;
        }
        
        /* Header */
        .hdr {
            padding: 24px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .hdr-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-mark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .brand-name {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .hdr-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            cursor: pointer;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid var(--border);
            background: var(--background);
            padding: 8px 24px 16px;
            z-index: 100;
        }
        
        .bottom-nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--muted-foreground);
            cursor: pointer;
            text-decoration: none;
        }
        
        .nav-item--active {
            color: var(--foreground);
            font-weight: 500;
        }
        
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--foreground);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error message */
        .error-message {
            padding: 24px;
            text-align: center;
            color: var(--destructive-foreground);
            background: var(--destructive);
            border-radius: var(--radius-lg);
            margin: 24px;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app">
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // Telegram init with fallback so first paint is not blocked.
        let tg = {
            ready: () => {},
            expand: () => {},
            initDataUnsafe: null,
            colorScheme: 'light',
            BackButton: null,
        };

        function initTelegramWebApp() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                return;
            }

            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            if (tg.colorScheme === 'dark') {
                document.documentElement.style.setProperty('--background', '#1c1c1d');
                document.documentElement.style.setProperty('--foreground', '#ffffff');
                document.documentElement.style.setProperty('--card', '#2c2c2e');
            }
            
            // Сохраняем данные пользователя
            saveTelegramUser();
        }
        
        function saveTelegramUser() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) return;
            
            fetch('/telegram/save-user/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    initData: tg.initData,
                    user: user,
                }),
            })
            .then(r => r.json())
            .then(data => {
                console.log('[Telegram] User saved:', data);
            })
            .catch(err => console.error('[Telegram] Save error:', err));
        }

        function loadDeferredScript(src, { async = true, callback } = {}) {
            const script = document.createElement('script');
            script.src = src;
            script.async = async;
            if (callback) {
                script.onload = callback;
            }
            document.head.appendChild(script);
        }

        function initExternalScripts() {
            loadDeferredScript('https://telegram.org/js/telegram-web-app.js', {
                callback: initTelegramWebApp,
            });
            loadDeferredScript('https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js');
        }

        document.addEventListener('DOMContentLoaded', initExternalScripts);

        window.dataLayer = window.dataLayer || [];

        function normalizeProductRecord(item) {
            return {
                id: item.id || item.sku || '',
                name: item.name || item.title || '',
                price: item.price || 0,
                quantity: item.quantity || 1,
                category: item.category || '��������',
            };
        }

        function dataLayerCart(items, total, currency = 'RUB') {
            const products = items.map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'view_cart',
                ecommerce: {
                    currencyCode: currency,
                    cart: {
                        actionField: {
                            total: total,
                        },
                        products,
                    },
                },
            });
        }

        function dataLayerPurchase(order = {}, currency = 'RUB') {
            const products = (order.items || []).map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'purchase',
                ecommerce: {
                    currencyCode: order.currency || currency,
                    purchase: {
                        actionField: {
                            id: order.id || order.order_number,
                            revenue: order.total,
                            tax: order.tax,
                            shipping: order.shipping,
                        },
                        products,
                    },
                },
            });
        }

        function initYandexMetrika() {
            if (window._ymInitialized) {
                return;
            }
            window._ymInitialized = true;
            loadDeferredScript('https://mc.yandex.ru/metrika/tag.js?id=107038425', {
                callback: () => {
                    if (window.ym) {
                        ym(107038425, 'init', {
                            clickmap: true,
                            webvisor: true,
                            trackLinks: true,
                            accurateTrackBounce: true,
                            ecommerce: 'dataLayer',
                        });
                        ym(107038425, 'reachGoal', 'pageview');
                    }
                },
            });
        }

        window.addEventListener('load', initYandexMetrika);

        // ������� ������� ��� API ��������
        async function apiRequest(url, options = {}) {
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                },
            };
            
            const response = await fetch(url, { ...defaultOptions, ...options });
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            
            return response.json();
        }

        // ������� ��� ���������
        function navigateTo(url) {
            if (tg.BackButton) {
                tg.BackButton.show();
            }
            window.location.href = url;
        }
    </script>

    <!-- Analytics Tracker -->
    <script>
        // ����������� endpoint ��� �������
        window.ANALYTICS_ENDPOINT = '/analytics/track/';
    </script>
    <script src="{% static 'analytics/tracker.js' %}" defer></script>
    <script>
        // ���������� � ������� - ������� �������
        function trackOrderComplete(orderId, revenue, items) {
            if (window.AnalyticsTracker) {
                window.AnalyticsTracker.trackPurchase(orderId, revenue, items);
            }
        }
    </script>

    <noscript><div><img src="https://mc.yandex.ru/watch/107038425" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    {% block extra_js %}{% endblock %}
</body>
</html>
