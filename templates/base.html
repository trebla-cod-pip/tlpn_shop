<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="yandex-verification" content="103929b73c517404" />
    <title>{% block title %}Tulipa - ������� ���������{% endblock %}</title>

    <!-- Local fonts generated by setup_fonts.sh / setup.sh -->
    <link rel="preload" href="{% static 'fonts/Inter-400.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{% static 'fonts/Inter-500.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">

    <!-- DNS Prefetch для внешних ресурсов -->
    <link rel="dns-prefetch" href="https://telegram.org">
    <link rel="preconnect" href="https://telegram.org" crossorigin>
    <link rel="dns-prefetch" href="https://mc.yandex.ru">
    <link rel="preconnect" href="https://mc.yandex.ru" crossorigin>

    <!-- Preconnect for hero image host -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin>
    
    <style>
        :root {
            --background: #ffffff;
            --foreground: #0b0b0b;
            --border: #00000014;
            --input: #f6f6f6;
            --primary: #000000;
            --primary-foreground: #ffffff;
            --secondary: #f3f4f6;
            --secondary-foreground: #0b0b0b;
            --muted: #f8f8f9;
            --muted-foreground: #8b8b8b;
            --success: #e6f9f0;
            --success-foreground: #0b6d3a;
            --accent: #fdecef;
            --accent-foreground: #9b2b2b;
            --destructive: #fff1f0;
            --destructive-foreground: #a50e0e;
            --warning: #fff7e6;
            --warning-foreground: #7a5a00;
            --card: #ffffff;
            --card-foreground: #0b0b0b;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --font-family-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-family-body);
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 72px;
        }
        
        /* Header */
        .hdr {
            padding: 24px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .hdr-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-mark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .brand-name {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .hdr-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            cursor: pointer;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid var(--border);
            background: var(--background);
            padding: 8px 24px 16px;
            z-index: 100;
        }
        
        .bottom-nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--muted-foreground);
            cursor: pointer;
            text-decoration: none;
        }
        
        .nav-item--active {
            color: var(--foreground);
            font-weight: 500;
        }
        
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--foreground);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error message */
        .error-message {
            padding: 24px;
            text-align: center;
            color: var(--destructive-foreground);
            background: var(--destructive);
            border-radius: var(--radius-lg);
            margin: 24px;
        }

        /* ========================================
           DESKTOP STYLES (≥1024px)
           ======================================== */
        @media (min-width: 1024px) {
            /* Container */
            .container {
                max-width: 1440px;
                margin: 0 auto;
                width: 100%;
                padding: 0 80px;
            }

            /* Header Desktop */
            .hdr {
                padding: 32px 80px;
            }

            .hdr-left {
                gap: 12px;
            }

            .brand-mark {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .brand-name {
                font-size: 18px;
            }

            .hdr-right {
                gap: 16px;
            }

            .icon-btn {
                width: 44px;
                height: 44px;
            }

            .icon-btn .icon {
                width: 20px;
                height: 20px;
            }

            /* Bottom Nav - скрываем на десктопе */
            .bottom-nav {
                display: none;
            }

            .app-inner {
                padding-bottom: 0;
            }

            /* Desktop Navigation (верхнее меню) */
            .desktop-nav {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .desktop-nav .nav-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 16px;
                border-radius: var(--radius-xl);
                font-size: 14px;
                color: var(--muted-foreground);
                text-decoration: none;
                transition: all 0.2s ease;
            }

            .desktop-nav .nav-item:hover {
                background: var(--input);
                color: var(--foreground);
            }

            .desktop-nav .nav-item--active {
                background: var(--foreground);
                color: var(--background);
            }

            .desktop-nav .nav-item .icon {
                width: 18px;
                height: 18px;
            }

            /* Hero Desktop */
            .hero {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 120px;
                align-items: center;
                padding: 80px 0 120px;
            }

            .hero-text {
                gap: 32px;
            }

            .hero-kicker {
                font-size: 14px;
                letter-spacing: 3px;
            }

            .hero-title {
                font-size: 56px;
                line-height: 1.15;
                letter-spacing: -1px;
            }

            .hero-subtitle {
                font-size: 18px;
                line-height: 1.6;
                max-width: 480px;
            }

            .hero-media {
                aspect-ratio: 4/5;
                border-radius: var(--radius-lg);
            }

            /* Toolbar Desktop */
            .toolbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 0 48px;
            }

            .chip-row {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }

            .chip {
                padding: 10px 24px;
                border-radius: var(--radius-xl);
                border: 1px solid var(--border);
                font-size: 14px;
                font-weight: 500;
                color: var(--muted-foreground);
                cursor: pointer;
                white-space: nowrap;
            }

            .chip--active {
                background: var(--foreground);
                color: var(--background);
                border-color: var(--foreground);
            }

            .search-row {
                display: flex;
                gap: 16px;
                align-items: center;
            }

            .search-input {
                width: 320px;
                background: var(--input);
                border-radius: var(--radius-xl);
                padding: 14px 20px;
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--muted-foreground);
                font-size: 14px;
                cursor: pointer;
            }

            /* Products Grid Desktop */
            .section {
                padding-bottom: 120px;
            }

            .section-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 40px;
            }

            .section-title {
                font-size: 28px;
                font-weight: 500;
            }

            .section-link {
                font-size: 15px;
                color: var(--muted-foreground);
                font-weight: 500;
                cursor: pointer;
            }

            .product-grid {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 32px;
            }

            .product-card {
                background: var(--card);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .product-media {
                width: 100%;
                aspect-ratio: 3/4;
                border-radius: var(--radius-md);
                overflow: hidden;
                background: var(--muted);
            }

            .product-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .product-name {
                font-size: 18px;
                font-weight: 500;
                line-height: 1.3;
            }

            .product-meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .product-price {
                font-size: 16px;
                font-weight: 500;
            }

            .product-tag {
                font-size: 12px;
                padding: 4px 12px;
                border-radius: var(--radius-xl);
                background: var(--secondary);
                color: var(--secondary-foreground);
                font-weight: 500;
            }

            /* Product Detail Page Desktop */
            .product-detail-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 120px;
                align-items: start;
            }

            .product-image-section {
                position: sticky;
                top: 80px;
            }

            .product-image-section img {
                max-width: 600px;
                margin: 0 auto;
                display: block;
            }

            .product-info-section {
                padding: 40px 0;
            }

            .product-info-section .title {
                font-size: 40px;
            }

            .product-info-section .price {
                font-size: 28px;
            }

            .product-info-section .desc {
                font-size: 18px;
                max-width: 480px;
            }

            .product-info-section .add {
                max-width: 400px;
            }

            /* Cart Desktop */
            .cart-content {
                display: grid;
                grid-template-columns: 1fr 400px;
                gap: 64px;
                padding: 40px 0 80px;
            }

            .cart-list-section {
                min-height: 400px;
            }

            .cart-summary-sidebar {
                background: var(--input);
                border-radius: var(--radius-lg);
                padding: 32px;
                height: fit-content;
                position: sticky;
                top: 100px;
            }

            .cart-item {
                display: grid;
                grid-template-columns: 120px 1fr auto;
                gap: 24px;
                padding: 24px;
                border-bottom: 1px solid var(--border);
                align-items: center;
            }

            .cart-img-wrap {
                width: 120px;
                height: 120px;
                border-radius: var(--radius-md);
                overflow: hidden;
                background: var(--muted);
            }

            .cart-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .page-header {
                padding: 40px 0;
                text-align: center;
            }

            .page-header .page-title {
                font-size: 28px;
                font-weight: 500;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: var(--muted-foreground);
            }
        }

        /* ========================================
           TABLET STYLES (768px - 1023px)
           ======================================== */
        @media (min-width: 768px) and (max-width: 1023px) {
            .container {
                max-width: 1024px;
                margin: 0 auto;
                width: 100%;
                padding: 0 40px;
            }

            .hdr {
                padding: 24px 40px;
            }

            .product-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 24px;
            }

            .hero {
                grid-template-columns: 1fr;
                gap: 48px;
                padding: 48px 0 64px;
            }

            .hero-title {
                font-size: 40px;
            }

            /* Product Detail Tablet */
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 48px;
            }

            .product-info-section .title {
                font-size: 36px;
            }

            .product-info-section .price {
                font-size: 24px;
            }

            /* Cart Tablet */
            .cart-content {
                display: grid;
                grid-template-columns: 1fr;
                gap: 32px;
                padding: 40px 0 80px;
            }

            .cart-summary-sidebar {
                position: static;
            }

            .cart-item {
                display: grid;
                grid-template-columns: 100px 1fr;
                gap: 16px;
                padding: 20px;
                border-bottom: 1px solid var(--border);
            }

            .page-header {
                padding: 32px 0;
                text-align: center;
            }

            .page-header .page-title {
                font-size: 20px;
                font-weight: 500;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--muted-foreground);
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>

    <div class="app">
        <main id="main-content" tabindex="-1">
            {% block content %}{% endblock %}
        </main>

    <script>
        // Telegram init with fallback so first paint is not blocked.
        let tg = {
            ready: () => {},
            expand: () => {},
            initDataUnsafe: null,
            colorScheme: 'light',
            BackButton: null,
        };

        // Определение Telegram WebApp через User-Agent
        function isTelegramWebApp() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.includes('telegram') || ua.includes('tgwebapp');
        }

        function initTelegramWebApp() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                return;
            }

            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Включаем подтверждение закрытия
            tg.enableClosingConfirmation();

            // Используем светлую тему всегда (независимо от темы Telegram)
            tg.setHeaderColor('#ffffff');
            tg.setBackgroundColor('#ffffff');

            // Сохраняем данные пользователя
            saveTelegramUser();
        }

        function saveTelegramUser() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) {
                return;
            }

            fetch('/telegram/save-user/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    initData: tg.initData,
                    user: user,
                }),
            })
            .then(r => r.json())
            .then(data => {
                // Пользователь сохранён
            })
            .catch(err => console.error('[TMA] Save error:', err));
        }

        function loadDeferredScript(src, { async = true, callback } = {}) {
            const script = document.createElement('script');
            script.src = src;
            script.async = async;
            if (callback) {
                script.onload = callback;
            }
            document.head.appendChild(script);
        }

        function initExternalScripts() {
            // Загружаем Telegram WebApp скрипт сразу для всех
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-web-app.js';
            script.async = true;
            script.onload = initTelegramWebApp;
            document.head.appendChild(script);
        }

        window.dataLayer = window.dataLayer || [];

        function normalizeProductRecord(item) {
            return {
                id: item.id || item.sku || '',
                name: item.name || item.title || '',
                price: item.price || 0,
                quantity: item.quantity || 1,
                category: item.category || '��������',
            };
        }

        function dataLayerCart(items, total, currency = 'RUB') {
            const products = items.map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'view_cart',
                ecommerce: {
                    currencyCode: currency,
                    cart: {
                        actionField: {
                            total: total,
                        },
                        products,
                    },
                },
            });
        }

        function dataLayerPurchase(order = {}, currency = 'RUB') {
            const products = (order.items || []).map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'purchase',
                ecommerce: {
                    currencyCode: order.currency || currency,
                    purchase: {
                        actionField: {
                            id: order.id || order.order_number,
                            revenue: order.total,
                            tax: order.tax,
                            shipping: order.shipping,
                        },
                        products,
                    },
                },
            });
        }

        function initYandexMetrika() {
            if (window._ymInitialized) {
                return;
            }
            window._ymInitialized = true;
            loadDeferredScript('https://mc.yandex.ru/metrika/tag.js?id=107038425', {
                callback: () => {
                    if (window.ym) {
                        ym(107038425, 'init', {
                            clickmap: true,
                            webvisor: true,
                            trackLinks: true,
                            accurateTrackBounce: true,
                            ecommerce: 'dataLayer',
                        });
                        ym(107038425, 'reachGoal', 'pageview');
                    }
                },
            });
        }

        window.addEventListener('load', initYandexMetrika);

        // ������� ������� ��� API ��������
        async function apiRequest(url, options = {}) {
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                },
            };
            
            const response = await fetch(url, { ...defaultOptions, ...options });
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            
            return response.json();
        }

        // ������� ��� ���������
        function navigateTo(url) {
            if (tg.BackButton) {
                tg.BackButton.show();
            }
            window.location.href = url;
        }
    </script>

    <!-- Analytics Tracker -->
