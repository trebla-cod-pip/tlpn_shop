<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="yandex-verification" content="103929b73c517404" />
    <title>{% block title %}Tulipa - ������� ���������{% endblock %}</title>

    <!-- Local fonts generated by setup_fonts.sh / setup.sh -->
    <link rel="preload" href="{% static 'fonts/Inter-400.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{% static 'fonts/Inter-500.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">

    <!-- DNS Prefetch для внешних ресурсов -->
    <link rel="dns-prefetch" href="https://telegram.org">
    <link rel="preconnect" href="https://telegram.org" crossorigin>
    <link rel="dns-prefetch" href="https://mc.yandex.ru">
    <link rel="preconnect" href="https://mc.yandex.ru" crossorigin>

    <!-- Preconnect for hero image host -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin>
    
    <style>
        :root {
            --background: #ffffff;
            --foreground: #0b0b0b;
            --border: #00000014;
            --input: #f6f6f6;
            --primary: #000000;
            --primary-foreground: #ffffff;
            --secondary: #f3f4f6;
            --secondary-foreground: #0b0b0b;
            --muted: #f8f8f9;
            --muted-foreground: #8b8b8b;
            --success: #e6f9f0;
            --success-foreground: #0b6d3a;
            --accent: #fdecef;
            --accent-foreground: #9b2b2b;
            --destructive: #fff1f0;
            --destructive-foreground: #a50e0e;
            --warning: #fff7e6;
            --warning-foreground: #7a5a00;
            --card: #ffffff;
            --card-foreground: #0b0b0b;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --font-family-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-family-body);
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 72px;
        }
        
        /* Header */
        .hdr {
            padding: 24px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .hdr-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-mark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .brand-name {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .hdr-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            cursor: pointer;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid var(--border);
            background: var(--background);
            padding: 8px 24px 16px;
            z-index: 100;
        }
        
        .bottom-nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--muted-foreground);
            cursor: pointer;
            text-decoration: none;
        }
        
        .nav-item--active {
            color: var(--foreground);
            font-weight: 500;
        }
        
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--foreground);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error message */
        .error-message {
            padding: 24px;
            text-align: center;
            color: var(--destructive-foreground);
            background: var(--destructive);
            border-radius: var(--radius-lg);
            margin: 24px;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- SVG Icons Sprite (Common) - в начале для доступности иконок -->
    <svg style="display: none;">
        <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </symbol>
        <symbol id="icon-shopping-bag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>
        </symbol>
        <symbol id="icon-delivery" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="16" height="13" x="1" y="3" rx="2"/><path d="M16 8h4a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1"/><circle cx="7.5" cy="15.5" r="2.5"/><circle cx="17.5" cy="15.5" r="2.5"/>
        </symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        </symbol>
        <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </symbol>
        <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </symbol>
        <symbol id="icon-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/>
        </symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"/><path d="M5 12h14"/>
        </symbol>
        <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </symbol>
        <symbol id="icon-check-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </symbol>
        <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </symbol>
        <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </symbol>
    </svg>

    <div class="app">
        <main id="main-content" tabindex="-1">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    <script>
        // Telegram init with fallback so first paint is not blocked.
        let tg = {
            ready: () => {},
            expand: () => {},
            initDataUnsafe: null,
            colorScheme: 'light',
            BackButton: null,
        };

        // Определение Telegram WebApp через User-Agent
        function isTelegramWebApp() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.includes('telegram') || ua.includes('tgwebapp');
        }

        function initTelegramWebApp() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                return;
            }

            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Включаем подтверждение закрытия
            tg.enableClosingConfirmation();

            // Используем светлую тему всегда (независимо от темы Telegram)
            tg.setHeaderColor('#ffffff');
            tg.setBackgroundColor('#ffffff');

            // Сохраняем данные пользователя
            saveTelegramUser();
        }

        function saveTelegramUser() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) {
                return;
            }

            fetch('/telegram/save-user/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    initData: tg.initData,
                    user: user,
                }),
            })
            .then(r => r.json())
            .then(data => {
                // Пользователь сохранён
            })
            .catch(err => console.error('[TMA] Save error:', err));
        }

        function loadDeferredScript(src, { async = true, callback } = {}) {
            const script = document.createElement('script');
            script.src = src;
            script.async = async;
            if (callback) {
                script.onload = callback;
            }
            document.head.appendChild(script);
        }

        function initExternalScripts() {
            // Загружаем Telegram WebApp скрипт сразу для всех
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-web-app.js';
            script.async = true;
            script.onload = initTelegramWebApp;
            document.head.appendChild(script);
        }

        window.dataLayer = window.dataLayer || [];

        function normalizeProductRecord(item) {
            return {
                id: item.id || item.sku || '',
                name: item.name || item.title || '',
                price: item.price || 0,
                quantity: item.quantity || 1,
                category: item.category || '��������',
            };
        }

        function dataLayerCart(items, total, currency = 'RUB') {
            const products = items.map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'view_cart',
                ecommerce: {
                    currencyCode: currency,
                    cart: {
                        actionField: {
                            total: total,
                        },
                        products,
                    },
                },
            });
        }

        function dataLayerPurchase(order = {}, currency = 'RUB') {
            const products = (order.items || []).map(normalizeProductRecord);
            window.dataLayer.push({
                event: 'purchase',
                ecommerce: {
                    currencyCode: order.currency || currency,
                    purchase: {
                        actionField: {
                            id: order.id || order.order_number,
                            revenue: order.total,
                            tax: order.tax,
                            shipping: order.shipping,
                        },
                        products,
                    },
                },
            });
        }

        function initYandexMetrika() {
            if (window._ymInitialized) {
                return;
            }
            window._ymInitialized = true;
            loadDeferredScript('https://mc.yandex.ru/metrika/tag.js?id=107038425', {
                callback: () => {
                    if (window.ym) {
                        ym(107038425, 'init', {
                            clickmap: true,
                            webvisor: true,
                            trackLinks: true,
                            accurateTrackBounce: true,
                            ecommerce: 'dataLayer',
                        });
                        ym(107038425, 'reachGoal', 'pageview');
                    }
                },
            });
        }

        window.addEventListener('load', initYandexMetrika);

        // ������� ������� ��� API ��������
        async function apiRequest(url, options = {}) {
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                },
            };
            
            const response = await fetch(url, { ...defaultOptions, ...options });
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            
            return response.json();
        }

        // ������� ��� ���������
        function navigateTo(url) {
            if (tg.BackButton) {
                tg.BackButton.show();
            }
            window.location.href = url;
        }
    </script>

    <!-- Analytics Tracker -->
    <script>
        // ����������� endpoint ��� �������
        window.ANALYTICS_ENDPOINT = '/analytics/track/';
    </script>
    <script src="{% static 'analytics/tracker.js' %}" defer></script>
    <script>
        // ���������� � ������� - ������� �������
        function trackOrderComplete(orderId, revenue, items) {
            if (window.AnalyticsTracker) {
                window.AnalyticsTracker.trackPurchase(orderId, revenue, items);
            }
        }
    </script>

    <noscript><div><img src="https://mc.yandex.ru/watch/107038425" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <!-- Инициализация внешних скриптов (Telegram WebApp и др.) -->
    <script>
        // Вызываем после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initExternalScripts);
        } else {
            initExternalScripts();
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
