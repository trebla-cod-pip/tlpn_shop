{% extends 'base.html' %}
{% load static %}

{% block title %}{{ product.name }} - Tulipa{% endblock %}

{% block content %}
<div class="app" style="height: 100%; display: flex; flex-direction: column; background: var(--background); color: var(--foreground); overflow-y: auto; overflow-x: hidden;">
    <!-- Header -->
    <header class="hdr" style="display: flex; justify-content: space-between; align-items: center; padding: 32px 32px 16px; flex-shrink: 0;">
        <div class="icn" onclick="window.history.back()" style="width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
            <iconify-icon icon="lucide:arrow-left" style="font-size: 24px; color: var(--foreground)"></iconify-icon>
        </div>
        <div class="brand" style="font-size: 14px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; margin-left: 4px;">Tulipa</div>
        <div class="icn" onclick="navigateTo('/bag/')" style="width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
            <iconify-icon icon="lucide:shopping-bag" style="font-size: 24px; color: var(--foreground)"></iconify-icon>
        </div>
    </header>

    <!-- Loading state -->
    <div id="loading" class="loading" style="flex: 1;">
        <div class="spinner"></div>
    </div>

    <!-- Error state -->
    <div id="error" class="error-message" style="display: none; margin: 24px;">
        Не удалось загрузить товар. Попробуйте снова.
    </div>

    <!-- Product Content -->
    <div id="product-content" style="display: none; flex: 1; flex-direction: column;">
        <!-- Hero Image -->
        <div class="hero" style="padding: 16px 32px 40px; flex-shrink: 0;">
            <img id="product-image" class="img" style="width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: var(--radius-lg);" 
                 src="" alt="">
        </div>

        <!-- Product Info -->
        <div class="cnt" style="padding: 0 32px; flex: 1; display: flex; flex-direction: column;">
            <h1 id="product-title" class="title" style="font-size: 32px; font-weight: 400; line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 8px;"></h1>
            <span id="product-price" class="price" style="font-size: 20px; font-weight: 400; color: var(--foreground); margin-bottom: 24px;"></span>
            <p id="product-description" class="desc" style="font-size: 15px; line-height: 1.7; color: var(--muted-foreground); margin-bottom: 48px; font-weight: 400;"></p>
            
            <!-- Quantity Selector -->
            <div class="opt" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px;">
                <span class="lbl" style="font-size: 15px; font-weight: 500;">Количество</span>
                <div class="qty" style="display: flex; align-items: center; gap: 24px;">
                    <div class="q-btn" id="btn-minus" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 50%; cursor: pointer;">
                        <iconify-icon icon="lucide:minus" style="font-size: 16px; color: var(--muted-foreground)"></iconify-icon>
                    </div>
                    <span id="quantity-value" class="q-val" style="font-size: 16px; font-weight: 500; min-width: 16px; text-align: center;">1</span>
                    <div class="q-btn" id="btn-plus" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 50%; cursor: pointer;">
                        <iconify-icon icon="lucide:plus" style="font-size: 16px; color: var(--foreground)"></iconify-icon>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add to Cart Button -->
        <div class="btm" style="padding: 0 32px 40px; margin-top: auto; flex-shrink: 0;">
            <button id="add-to-cart-btn" class="add" style="background: var(--foreground); color: var(--background); width: 100%; padding: 20px 24px; border-radius: var(--radius-xl); display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 500; border: none; letter-spacing: 0.5px; cursor: pointer;">
                <span>В корзину</span> 
                <span id="total-price"></span>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let quantity = 1;
    let product = null;
    // Получаем slug из URL правильно
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const slug = pathParts[pathParts.length - 1];
    console.log('Product slug:', slug);

    // Загрузка данных товара
    async function loadProduct() {
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const content = document.getElementById('product-content');

        try {
            console.log('Loading product:', `/api/products/${slug}/`);
            const response = await apiRequest(`/api/products/${slug}/`);
            console.log('Product loaded:', response);
            product = response;

            // Заполняем данные
            document.getElementById('product-image').src = product.image || 'https://via.placeholder.com/400x500';
            document.getElementById('product-image').alt = product.name;
            document.getElementById('product-title').textContent = product.name;
            document.getElementById('product-price').textContent = `${product.price} ₽`;
            document.getElementById('product-description').textContent = product.description;
            document.getElementById('total-price').textContent = `${product.price} ₽`;

            // Обновляем title страницы
            document.title = `${product.name} - Tulipa`;

            loading.style.display = 'none';
            content.style.display = 'flex';
        } catch (error) {
            console.error('Error loading product:', error);
            loading.style.display = 'none';
            error.style.display = 'block';
        }
    }

    // Обновление количества
    function updateQuantity() {
        document.getElementById('quantity-value').textContent = quantity;
        if (product) {
            document.getElementById('total-price').textContent = `${(product.price * quantity).toFixed(2)} ₽`;
        }
        
        // Haptic feedback через Telegram
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    // Добавление в корзину
    function addToCart() {
        if (!product) return;
        
        // Получаем текущую корзину
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        
        // Проверяем, есть ли товар уже в корзине
        const existingItem = cart.find(item => item.id === product.id);
        
        if (existingItem) {
            existingItem.quantity += quantity;
        } else {
            cart.push({
                id: product.id,
                slug: product.slug,
                name: product.name,
                price: parseFloat(product.price),
                image: product.image,
                cart_image: product.cart_image || product.image,
                quantity: quantity
            });
        }
        
        // Сохраняем корзину
        localStorage.setItem('cart', JSON.stringify(cart));
        
        // Haptic feedback
        if (tg.HapticFeedback) {
            tg.HapticFeedback.notificationOccurred('success');
        }
        
        // Показывем подтверждение
        const btn = document.getElementById('add-to-cart-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span>Добавлено!</span>';
        btn.style.background = 'var(--success-foreground)';
        
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = 'var(--foreground)';
            navigateTo('/bag/');
        }, 800);
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        loadProduct();
        
        // Обработчики кнопок количества
        document.getElementById('btn-minus').addEventListener('click', () => {
            if (quantity > 1) {
                quantity--;
                updateQuantity();
            }
        });
        
        document.getElementById('btn-plus').addEventListener('click', () => {
            quantity++;
            updateQuantity();
        });
        
        // Обработчик кнопки "В корзину"
        document.getElementById('add-to-cart-btn').addEventListener('click', addToCart);
    });
</script>
{% endblock %}
